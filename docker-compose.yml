services:
  postgres:
    image: postgres:16-alpine
    container_name: clientflow2_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clientflow2
    ports:
      - '5434:5432'
    volumes:
      - clientflow2_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clientflow2_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: clientflow2
      JWT_SECRET: clientflow2-secret-key
      FRONTEND_URL: http://localhost:3001
    ports:
      - '127.0.0.1:4001:4000'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clientflow2_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '127.0.0.1:3001:3000'

volumes:
  clientflow2_pgdata: